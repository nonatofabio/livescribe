name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            name: livescribe-macos-arm64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: livescribe-linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libasound2-dev espeak-ng

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake espeak-ng

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
        env:
          # whisper.cpp's GGML_NATIVE=ON (default) uses -mcpu=native which
          # enables i8mm ARM NEON intrinsics on CI. The cmake crate then
          # overrides with --target=arm64-apple-macosx flags that don't
          # include i8mm, causing a compilation error. Setting -mcpu=generic
          # in CFLAGS prevents the native CPU detection from adding i8mm.
          CFLAGS: ${{ matrix.os == 'macos-latest' && '-mcpu=generic' || '' }}
          CXXFLAGS: ${{ matrix.os == 'macos-latest' && '-mcpu=generic' || '' }}

      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.name }}.tar.gz livescribe
          cd ../../..

      - name: Generate checksum
        run: |
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            shasum -a 256 ${{ matrix.name }}.tar.gz > ${{ matrix.name }}.tar.gz.sha256
          else
            sha256sum ${{ matrix.name }}.tar.gz > ${{ matrix.name }}.tar.gz.sha256
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ matrix.name }}.tar.gz
            ${{ matrix.name }}.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.sha256
